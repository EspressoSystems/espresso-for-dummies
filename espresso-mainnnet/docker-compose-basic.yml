services:
  sequencer:
    image: ghcr.io/espressosystems/espresso-sequencer/sequencer:20260312
    stop_grace_period: 15m
    entrypoint:
      - tini
      - -g
      - --
    command:
      - /bin/sequencer-postgres
      - --
      - http
      - --
      - catchup
      - --
      - config
      - --
      - status
    environment:
      - RUST_LOG=warn,hotshot_libp2p_networking=off
      #- RUST_LOG_FORMAT=json
      - ESPRESSO_SEQUENCER_API_PORT=8088
      - ESPRESSO_SEQUENCER_GENESIS_FILE=/genesis/mainnet.toml
      - ESPRESSO_SEQUENCER_API_PEERS=https://cache.main.net.espresso.network/,https://query.main.net.espresso.network/
      - ESPRESSO_SEQUENCER_CONFIG_PEERS=https://cache.main.net.espresso.network/,https://query.main.net.espresso.network/
      - ESPRESSO_SEQUENCER_STATE_PEERS=https://cache.main.net.espresso.network/,https://query.main.net.espresso.network/
      - ESPRESSO_STATE_RELAY_SERVER_URL=https://state-relay.main.net.espresso.network
      - ESPRESSO_SEQUENCER_CDN_ENDPOINT=cdn.main.net.espresso.network:1737
      #
      # Libp2p
      #
      - ESPRESSO_SEQUENCER_LIBP2P_BIND_ADDRESS=0.0.0.0:4455
      - ESPRESSO_SEQUENCER_LIBP2P_ADVERTISE_ADDRESS=${PUBLIC_IP:?error}:4455
      - ESPRESSO_SEQUENCER_LIBP2P_BOOTSTRAP_NODES=/dns/main-network-d26f3636a4e56b65.elb.us-east-2.amazonaws.com/udp/2000/quic-v1/p2p/12D3KooWDKf3RMqrRu7jsbsskPGbdPyzVknmzM7KtMUbR9obHACu,/dns/main-network-d26f3636a4e56b65.elb.us-east-2.amazonaws.com/udp/2001/quic-v1/p2p/12D3KooWK9YtnNqFQ51by23zv6PmGdzrADf8HhzsPRAbyAM5MZh5,/dns/main-network-d26f3636a4e56b65.elb.us-east-2.amazonaws.com/udp/2002/quic-v1/p2p/12D3KooWJK5yrh2h7QDbk53mQR3mYQKTfkkiJfTkPkifi6RFmgQc,/dns/main-network-d26f3636a4e56b65.elb.us-east-2.amazonaws.com/udp/2003/quic-v1/p2p/12D3KooWGgju14hJGLeGds5Ey8vTDC5E9AhcZm86S4gx4b1ZHANA,/dns/main-network-d26f3636a4e56b65.elb.us-east-2.amazonaws.com/udp/2004/quic-v1/p2p/12D3KooWLSztiG7tPdjJpPdN7H86SiVVBMRVjCT3AbtWGHRyUm2R
      #
      # Secrets
      #
      - ESPRESSO_SEQUENCER_L1_PROVIDER=${ESPRESSO_SEQUENCER_L1_PROVIDER:?error}
      - ESPRESSO_SEQUENCER_L1_WS_PROVIDER=${ESPRESSO_SEQUENCER_L1_WS_PROVIDER:?error}
      - ESPRESSO_SEQUENCER_PRIVATE_STAKING_KEY=${ESPRESSO_SEQUENCER_PRIVATE_STAKING_KEY:?error}
      - ESPRESSO_SEQUENCER_PRIVATE_STATE_KEY=${ESPRESSO_SEQUENCER_PRIVATE_STATE_KEY:?error}
      #
      # Optional Node Identification
      #
      #- ESPRESSO_SEQUENCER_IDENTITY_NODE_NAME=Our-Node-1
      #- ESPRESSO_SEQUENCER_IDENTITY_COMPANY_NAME=Example Company
      #- ESPRESSO_SEQUENCER_IDENTITY_COMPANY_WEBSITE=https://example.com
      #- ESPRESSO_SEQUENCER_IDENTITY_OPERATING_SYSTEM=Linux
      #- ESPRESSO_SEQUENCER_IDENTITY_NETWORK_TYPE=AWS
      #- ESPRESSO_SEQUENCER_IDENTITY_COUNTRY_CODE=US
      #- ESPRESSO_SEQUENCER_IDENTITY_LATITUDE=0.0
      #- ESPRESSO_SEQUENCER_IDENTITY_LONGITUDE=0.0
    ports:
      - 8088:8088 # General HTTP
      - 4455:4455/tcp # Libp2p
      - 4455:4455/udp # Libp2p
    volumes:
      - ./datastore:/store/sequencer
