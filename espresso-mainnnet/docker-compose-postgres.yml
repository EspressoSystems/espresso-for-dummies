services:
  sequencer:
    image: ghcr.io/espressosystems/espresso-sequencer/sequencer:20260223
    stop_grace_period: 15m
    entrypoint:
      - tini
      - -g
      - --
    command:
      - /bin/sequencer-postgres
      - --
      - storage-sql
      - --
      - http
      - --
      - catchup
      - --
      - config
      - --
      - explorer
      #- --
      #- hotshot-events
      - --
      - query
      - --
      - status
    environment:
      - RUST_LOG=warn,hotshot_libp2p_networking=off
      #- RUST_LOG_FORMAT=json
      #- ESPRESSO_SEQUENCER_IS_DA=true
      #- ESPRESSO_SEQUENCER_HOTSHOT_EVENT_STREAMING_API_PORT=8089
      - ESPRESSO_SEQUENCER_API_PORT=8088
      - ESPRESSO_SEQUENCER_GENESIS_FILE=/genesis/mainnet.toml
      - ESPRESSO_SEQUENCER_API_PEERS=https://cache.main.net.espresso.network/,https://query.main.net.espresso.network/
      - ESPRESSO_SEQUENCER_CONFIG_PEERS=https://cache.main.net.espresso.network/,https://query.main.net.espresso.network/
      - ESPRESSO_SEQUENCER_STATE_PEERS=https://cache.main.net.espresso.network/,https://query.main.net.espresso.network/
      - ESPRESSO_STATE_RELAY_SERVER_URL=https://state-relay.main.net.espresso.network
      - ESPRESSO_SEQUENCER_CDN_ENDPOINT=cdn.main.net.espresso.network:1737
      - ESPRESSO_SEQUENCER_LIBP2P_BOOTSTRAP_NODES=/dns/main-network-d26f3636a4e56b65.elb.us-east-2.amazonaws.com/udp/2004/quic-v1/p2p/12D3KooWLSztiG7tPdjJpPdN7H86SiVVBMRVjCT3AbtWGHRyUm2R,/dns/main-network-d26f3636a4e56b65.elb.us-east-2.amazonaws.com/udp/2005/quic-v1/p2p/12D3KooWGR4tdbEcraDnuTx1uLuu3HkHX5y6Uq8sLbeuxvBXDRKn,/dns/main-network-d26f3636a4e56b65.elb.us-east-2.amazonaws.com/udp/2006/quic-v1/p2p/12D3KooWA2y5h7szi1uP83HFXkF1z8wQxWMALXhNyoAUrZXnVcyV,/dns/main-network-d26f3636a4e56b65.elb.us-east-2.amazonaws.com/udp/2007/quic-v1/p2p/12D3KooWFSP2pbRyM3DbjDHDTgX7k5M2PRrQ2Kcs9B7CJhN98fzW,/dns/main-network-d26f3636a4e56b65.elb.us-east-2.amazonaws.com/udp/2008/quic-v1/p2p/12D3KooWMuQdPDCBEKSeM1u59yhv8ALjX6qkPrDp5QbsVyTyZenH,/dns/main-network-d26f3636a4e56b65.elb.us-east-2.amazonaws.com/udp/2009/quic-v1/p2p/12D3KooW9tfmTcUtngZD5VHYwe48YqBYJeNUFDPnrFgo1YdWKXrv,/dns/main-network-d26f3636a4e56b65.elb.us-east-2.amazonaws.com/udp/2010/quic-v1/p2p/12D3KooWPjrK2GUraBeikw72NQfu5v3tDhabfGuG1UfHiwrdBktn,/dns/main-network-d26f3636a4e56b65.elb.us-east-2.amazonaws.com/udp/2011/quic-v1/p2p/12D3KooWBEEuHi91jPv43qDayau5p5Hj4o2rLPTUqSEPgLHeotVJ,/dns/main-network-d26f3636a4e56b65.elb.us-east-2.amazonaws.com/udp/2012/quic-v1/p2p/12D3KooWA3UfhVbSuSCs8nkDgxo3dSfpzQ4EpZE61ia1VoQZLdLU
      #
      # Postgres
      #
      - ESPRESSO_SEQUENCER_POSTGRES_HOST=postgres
      - ESPRESSO_SEQUENCER_POSTGRES_USER=postgres
      - ESPRESSO_SEQUENCER_POSTGRES_DATABASE=sequencer
      - ESPRESSO_SEQUENCER_POSTGRES_USE_TLS=false
      #
      # Pruning
      #
      #- ESPRESSO_SEQUENCER_DATABASE_PRUNE=true
      #- ESPRESSO_SEQUENCER_POSTGRES_PRUNE=true
      #- ESPRESSO_SEQUENCER_PRUNER_PRUNING_THRESHOLD=10GB
      #- ESPRESSO_SEQUENCER_PRUNER_MINIMUM_RETENTION=1d
      #- ESPRESSO_SEQUENCER_PRUNER_TARGET_RETENTION=7d
      #- ESPRESSO_SEQUENCER_PRUNER_MAX_USAGE=8000
      #- ESPRESSO_SEQUENCER_PRUNER_INTERVAL=5m
      #
      #
      # Secrets
      #
      - ESPRESSO_SEQUENCER_L1_PROVIDER=${ESPRESSO_SEQUENCER_L1_PROVIDER:?error}
      - ESPRESSO_SEQUENCER_L1_WS_PROVIDER=${ESPRESSO_SEQUENCER_L1_WS_PROVIDER:?error}
      - ESPRESSO_SEQUENCER_PRIVATE_STAKING_KEY=${ESPRESSO_SEQUENCER_PRIVATE_STAKING_KEY:?error}
      - ESPRESSO_SEQUENCER_PRIVATE_STATE_KEY=${ESPRESSO_SEQUENCER_PRIVATE_STATE_KEY:?error}
      - ESPRESSO_SEQUENCER_POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?error}
      #
      # Optional Node Identification
      #
      #- ESPRESSO_SEQUENCER_IDENTITY_NODE_NAME=Our-Node-1
      #- ESPRESSO_SEQUENCER_IDENTITY_COMPANY_NAME=Example Company
      #- ESPRESSO_SEQUENCER_IDENTITY_COMPANY_WEBSITE=https://example.com
      #- ESPRESSO_SEQUENCER_IDENTITY_OPERATING_SYSTEM=Linux
      #- ESPRESSO_SEQUENCER_IDENTITY_NETWORK_TYPE=AWS
      #- ESPRESSO_SEQUENCER_IDENTITY_COUNTRY_CODE=US
      #- ESPRESSO_SEQUENCER_IDENTITY_LATITUDE=0.0
      #- ESPRESSO_SEQUENCER_IDENTITY_LONGITUDE=0.0
    ports:
      - 8088:8088 # General HTTP
      #- 8089:8089 # Hotshot events
    volumes:
      - ./datastore:/store/sequencer
  postgres:
    image: postgres:17
    stop_grace_period: 15m
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?error}
      - POSTGRES_DB=sequencer
    ports:
      - 5432
    volumes:
      - postgres:/var/lib/postgresql/data
volumes:
  postgres:
